<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyPulse — News Verification Dashboard</title>
    <meta name="description" content="Real-time news verification dashboard that scores breaking news by trustworthiness">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2233;
            --bg-card-hover: #1f2a3d;
            --border: #2a3550;
            --border-light: #354160;
            --text-primary: #e8edf5;
            --text-secondary: #8899b4;
            --text-muted: #5a6a85;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --verified: #22c55e;
            --likely: #84cc16;
            --developing: #eab308;
            --unverified: #f97316;
            --disputed: #ef4444;
            --font-display: 'IBM Plex Mono', monospace;
            --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ─── HEADER ─────────────────────────────── */
        .header {
            background: rgba(17, 24, 39, 0.85);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            box-shadow: 0 2px 12px rgba(59, 130, 246, 0.25);
        }
        .logo-text {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .logo-text span { color: var(--accent); }

        .header-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .stat-pill {
            font-family: var(--font-display);
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-pill .num {
            color: var(--text-primary);
            font-weight: 600;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--verified);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        /* ─── SUMMARY BAR ────────────────────────── */
        .summary-bar {
            max-width: 1280px;
            margin: 16px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .summary-chip {
            font-family: var(--font-display);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .summary-chip .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* ─── FILTERS ────────────────────────────── */
        .filters {
            max-width: 1280px;
            margin: 12px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        .filter-btn.active {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }
        .filter-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 2px;
        }
        .refresh-btn {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid var(--accent);
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
            margin-left: auto;
        }
        .refresh-btn:hover { background: rgba(59, 130, 246, 0.2); }
        .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

        /* ─── MAIN LAYOUT ────────────────────────── */
        .main {
            max-width: 1280px;
            margin: 16px auto 0;
            padding: 0 24px 60px;
        }

        /* ─── STORY CARDS ────────────────────────── */
        .stories-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .story-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.3s ease both;
        }
        .story-card:nth-child(1) { animation-delay: 0ms; }
        .story-card:nth-child(2) { animation-delay: 40ms; }
        .story-card:nth-child(3) { animation-delay: 80ms; }
        .story-card:nth-child(4) { animation-delay: 120ms; }
        .story-card:nth-child(5) { animation-delay: 160ms; }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .story-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--card-accent, var(--text-muted));
            border-radius: 3px 0 0 3px;
        }
        .story-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .story-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 10px;
        }
        .story-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            flex: 1;
        }

        .confidence-badge {
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            border: 1px solid;
        }

        .story-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .meta-item {
            font-family: var(--font-display);
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .meta-item .val { color: var(--text-secondary); }

        .source-dots { display: flex; gap: 3px; }
        .source-dot {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            font-family: var(--font-display);
            font-size: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-transform: uppercase;
        }

        .region-tag {
            font-family: var(--font-display);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            background: var(--bg-secondary);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        /* ─── STORY DETAIL PANEL ─────────────────── */
        .detail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            justify-content: flex-end;
        }
        .detail-overlay.open { display: flex; }
        .detail-panel {
            width: min(620px, 92vw);
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 24px;
            animation: slideIn 0.25s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .detail-close {
            font-family: var(--font-display);
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .detail-close:hover { color: var(--text-primary); border-color: var(--border-light); }

        .detail-title {
            font-size: 21px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .score-display {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .score-ring {
            width: 72px;
            height: 72px;
            position: relative;
            flex-shrink: 0;
        }
        .score-ring svg { transform: rotate(-90deg); }
        .score-ring-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
        }
        .score-info { flex: 1; }
        .score-label {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
        }
        .score-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .breakdown-section { margin-bottom: 24px; }
        .section-title {
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .breakdown-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }
        .breakdown-label {
            font-size: 13px;
            color: var(--text-secondary);
            width: 110px;
            flex-shrink: 0;
        }
        .breakdown-track {
            flex: 1;
            height: 6px;
            background: var(--bg-primary);
            border-radius: 3px;
            overflow: hidden;
        }
        .breakdown-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .breakdown-value {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            width: 50px;
            text-align: right;
        }
        .breakdown-detail {
            font-size: 11px;
            color: var(--text-muted);
            margin: -2px 0 4px 120px;
        }

        /* ─── ARTICLE TIMELINE ───────────────────── */
        .timeline { position: relative; padding-left: 20px; }
        .timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: var(--border);
        }
        .timeline-item {
            position: relative;
            padding: 10px 14px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: border-color 0.2s;
        }
        .timeline-item:hover { border-color: var(--border-light); }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -18px;
            top: 16px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--border-light);
            background: var(--bg-secondary);
        }
        .timeline-item:first-child::before {
            background: var(--accent);
            border-color: var(--accent);
        }
        .timeline-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .timeline-source {
            font-size: 13px;
            font-weight: 600;
        }
        .timeline-cred {
            font-family: var(--font-display);
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
        }
        .timeline-time {
            font-family: var(--font-display);
            font-size: 10px;
            color: var(--text-muted);
            margin-left: auto;
        }
        .timeline-title {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .timeline-link {
            font-family: var(--font-display);
            font-size: 11px;
            color: var(--accent);
            text-decoration: none;
        }
        .timeline-link:hover { text-decoration: underline; }

        /* ─── LOADING & EMPTY STATES ─────────────── */
        .loading-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .loading-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-icon { font-size: 36px; margin-bottom: 10px; }
        .empty-text { font-size: 15px; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-hint { font-size: 13px; color: var(--text-muted); }
        .empty-hint a { color: var(--accent); }
        .empty-hint code { color: var(--accent); font-family: var(--font-display); font-size: 12px; }

        /* ─── FOOTER ─────────────────────────────── */
        .footer {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .footer-text {
            font-family: var(--font-display);
            font-size: 11px;
            color: var(--text-muted);
        }
        .footer-text a { color: var(--text-secondary); text-decoration: none; }
        .footer-text a:hover { color: var(--accent); }

        /* ─── RESPONSIVE ─────────────────────────── */
        @media (max-width: 768px) {
            .header-stats { gap: 12px; }
            .stat-pill:nth-child(n+4) { display: none; }
            .story-top { flex-direction: column; gap: 8px; }
            .confidence-badge { align-self: flex-start; }
            .filters { gap: 6px; }
            .filter-btn { padding: 6px 10px; font-size: 11px; }
            .detail-panel { padding: 16px; }
            .detail-title { font-size: 18px; }
            .breakdown-label { width: 90px; font-size: 12px; }
            .breakdown-detail { margin-left: 100px; }
        }
        @media (max-width: 480px) {
            .header { padding: 12px 16px; }
            .header-stats { display: none; }
            .filters { padding: 0 16px; }
            .main { padding: 0 16px 40px; }
            .summary-bar { padding: 0 16px; }
            .story-card { padding: 14px 16px; }
            .story-title { font-size: 14px; }
            .story-meta { gap: 10px; }
            .filter-divider { display: none; }
        }
    </style>
</head>
<body>

<!-- ─── HEADER ───────────────────────────────────────── -->
<header class="header">
    <div class="header-inner">
        <div class="logo">
            <div class="logo-icon">🔍</div>
            <div class="logo-text">Verify<span>Pulse</span></div>
        </div>
        <div class="header-stats">
            <div class="stat-pill">
                <div class="live-dot"></div>
                <span>LIVE</span>
            </div>
            <div class="stat-pill">
                Articles: <span class="num" id="stat-articles">--</span>
            </div>
            <div class="stat-pill">
                Sources: <span class="num" id="stat-sources">--</span>
            </div>
            <div class="stat-pill" id="stat-last-fetch">
                Updated: <span class="num">--</span>
            </div>
        </div>
    </div>
</header>

<!-- ─── SUMMARY BAR ──────────────────────────────────── -->
<div class="summary-bar" id="summary-bar"></div>

<!-- ─── FILTERS ──────────────────────────────────────── -->
<div class="filters">
    <button class="filter-btn active" data-region="">All Regions</button>
    <button class="filter-btn" data-region="global">Global</button>
    <button class="filter-btn" data-region="india">India</button>
    <button class="filter-btn" data-region="east_asia">East Asia</button>
    <button class="filter-btn" data-region="americas">Americas</button>
    <div class="filter-divider"></div>
    <button class="filter-btn active" data-confidence="0">All Levels</button>
    <button class="filter-btn" data-confidence="60">Verified+</button>
    <button class="filter-btn" data-confidence="40">Developing+</button>
    <button class="refresh-btn" id="refresh-btn" onclick="loadStories()">↻ Refresh</button>
</div>

<!-- ─── STORIES ──────────────────────────────────────── -->
<main class="main">
    <div class="stories-grid" id="stories-grid">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <div>Loading stories from VerifyPulse API...</div>
        </div>
    </div>
</main>

<!-- ─── FOOTER ───────────────────────────────────────── -->
<footer class="footer">
    <div class="footer-text">
        VerifyPulse v0.4 — News verification prototype
    </div>
    <div class="footer-text">
        Data: Reuters, AP, BBC, Al Jazeera, NDTV, GDELT ·
        <a href="http://localhost:8000/docs" target="_blank">API Docs</a>
    </div>
</footer>

<!-- ─── DETAIL PANEL ─────────────────────────────────── -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
    <div class="detail-panel" id="detail-panel" onclick="event.stopPropagation()">
        <button class="detail-close" onclick="closeDetail()">← Back to feed</button>
        <div id="detail-content"></div>
    </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────
const API_BASE = 'http://localhost:8000';
let currentRegion = '';
let currentMinConfidence = 0;
let allStories = [];

// ─── SOURCE CONFIG ─────────────────────────────────────
const SOURCE_COLORS = {
    reuters: '#ff6b00', ap_news: '#e4002b', bbc_world: '#bb1919',
    aljazeera: '#fa9e1c', ndtv: '#e23838',
};
const SOURCE_NAMES = {
    reuters: 'Reuters', ap_news: 'AP News', bbc_world: 'BBC World',
    aljazeera: 'Al Jazeera', ndtv: 'NDTV',
};

function getSourceColor(id) {
    if (SOURCE_COLORS[id]) return SOURCE_COLORS[id];
    let hash = 0;
    for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
    return `hsl(${Math.abs(hash) % 360}, 50%, 45%)`;
}

function getSourceInitials(id) {
    const map = { reuters:'R', ap_news:'AP', bbc_world:'BB', aljazeera:'AJ', ndtv:'ND' };
    if (map[id]) return map[id];
    return id.replace('gdelt_', '').substring(0, 2).toUpperCase();
}

function getSourceName(id) {
    if (SOURCE_NAMES[id]) return SOURCE_NAMES[id];
    if (id.startsWith('gdelt_')) return id.replace('gdelt_', '').replace(/_/g, '.');
    return id;
}

// ─── LOAD STATS ────────────────────────────────────────
async function loadStats() {
    try {
        const res = await fetch(`${API_BASE}/api/stats`);
        const data = await res.json();
        document.getElementById('stat-articles').textContent = data.total_articles || 0;
        document.getElementById('stat-sources').textContent = data.active_sources || 0;
        if (data.last_fetch && data.last_fetch.fetched_at) {
            document.getElementById('stat-last-fetch').querySelector('.num').textContent =
                timeAgo(data.last_fetch.fetched_at);
        }
    } catch (e) { console.error('Stats error:', e); }
}

// ─── LOAD STORIES ──────────────────────────────────────
async function loadStories() {
    const grid = document.getElementById('stories-grid');
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('loading');
    btn.textContent = '↻ Loading...';

    try {
        let url = `${API_BASE}/api/stories?hours=48`;
        if (currentRegion) url += `&region=${currentRegion}`;
        if (currentMinConfidence > 0) url += `&min_confidence=${currentMinConfidence}`;

        const res = await fetch(url);
        const data = await res.json();
        allStories = data.stories || [];

        // Update summary bar
        updateSummary(allStories);

        if (allStories.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div class="empty-text">No stories found</div>
                    <div class="empty-hint">
                        Try fetching news first: <a href="${API_BASE}/docs" target="_blank">API Docs</a>
                        → POST /api/fetch → Execute, then refresh here.
                    </div>
                </div>`;
            return;
        }

        grid.innerHTML = allStories.map(renderStoryCard).join('');
    } catch (e) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">⚠️</div>
                <div class="empty-text">Can't connect to VerifyPulse API</div>
                <div class="empty-hint">
                    Make sure the backend is running:<br>
                    <code>python -m uvicorn app.main:app --reload</code>
                </div>
            </div>`;
    } finally {
        btn.classList.remove('loading');
        btn.textContent = '↻ Refresh';
    }
}

// ─── SUMMARY BAR ───────────────────────────────────────
function updateSummary(stories) {
    const counts = { Verified: 0, 'Likely Accurate': 0, Developing: 0, Unverified: 0, Disputed: 0 };
    const colors = { Verified:'var(--verified)', 'Likely Accurate':'var(--likely)',
        Developing:'var(--developing)', Unverified:'var(--unverified)', Disputed:'var(--disputed)' };

    stories.forEach(s => { if (counts[s.confidence_label] !== undefined) counts[s.confidence_label]++; });

    const bar = document.getElementById('summary-bar');
    bar.innerHTML = Object.entries(counts)
        .filter(([, v]) => v > 0)
        .map(([label, count]) => `
            <div class="summary-chip" style="background:${colors[label]}15;color:${colors[label]};border:1px solid ${colors[label]}30">
                <div class="dot" style="background:${colors[label]}"></div>
                ${count} ${label}
            </div>
        `).join('') + `
            <div class="summary-chip" style="background:var(--bg-secondary);color:var(--text-muted);border:1px solid var(--border)">
                ${stories.length} total stories
            </div>`;
}

// ─── RENDER STORY CARD ─────────────────────────────────
function renderStoryCard(story) {
    const color = story.confidence_color || '#5a6a85';
    const sources = (story.source_ids || []).map(id =>
        `<div class="source-dot" style="background:${getSourceColor(id)}" title="${getSourceName(id)}">${getSourceInitials(id)}</div>`
    ).join('');

    const regions = (story.regions || []).map(r => `<span class="region-tag">${r}</span>`).join(' ');
    const timeStr = story.first_reported ? timeAgo(story.first_reported) : '';

    return `
        <div class="story-card" style="--card-accent:${color}" onclick="openDetail('${story.cluster_id}')">
            <div class="story-top">
                <div class="story-title">${escapeHtml(story.title)}</div>
                <div class="confidence-badge" style="color:${color};border-color:${color};background:${color}15">
                    ${story.confidence_score} · ${story.confidence_label}
                </div>
            </div>
            <div class="story-meta">
                <div class="meta-item">
                    <span class="source-dots">${sources}</span>
                    <span class="val">${story.source_count} source${story.source_count !== 1 ? 's' : ''}</span>
                </div>
                <div class="meta-item">
                    ${story.article_count} article${story.article_count !== 1 ? 's' : ''}
                </div>
                ${timeStr ? `<div class="meta-item">${timeStr}</div>` : ''}
                <div class="meta-item">${regions}</div>
            </div>
        </div>`;
}

// ─── SCORE RING SVG ────────────────────────────────────
function scoreRing(score, color) {
    const radius = 30;
    const circ = 2 * Math.PI * radius;
    const offset = circ - (score / 100) * circ;
    return `
        <div class="score-ring">
            <svg width="72" height="72" viewBox="0 0 72 72">
                <circle cx="36" cy="36" r="${radius}" fill="none" stroke="var(--border)" stroke-width="5"/>
                <circle cx="36" cy="36" r="${radius}" fill="none" stroke="${color}" stroke-width="5"
                    stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
            </svg>
            <div class="score-ring-text" style="color:${color}">${score}</div>
        </div>`;
}

// ─── STORY DETAIL ──────────────────────────────────────
async function openDetail(clusterId) {
    const overlay = document.getElementById('detail-overlay');
    const content = document.getElementById('detail-content');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    content.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div>Loading detail...</div>`;

    try {
        const res = await fetch(`${API_BASE}/api/stories/${clusterId}`);
        const data = await res.json();

        if (!data.found || !data.story) {
            content.innerHTML = `<div class="empty-state">Story not found</div>`;
            return;
        }

        const story = data.story;
        const color = story.confidence_color || '#5a6a85';
        const bd = story.scoring_breakdown || {};

        // Breakdown bars
        let breakdownHTML = '';
        if (bd.source_count) {
            breakdownHTML += buildBar('Sources', bd.source_count.points, bd.source_count.max, color, `${bd.source_count.value} independent sources`);
        }
        if (bd.avg_credibility) {
            breakdownHTML += buildBar('Credibility', bd.avg_credibility.points, bd.avg_credibility.max, color, `average score: ${bd.avg_credibility.value}/100`);
        }
        if (bd.source_diversity) {
            breakdownHTML += buildBar('Diversity', bd.source_diversity.points, bd.source_diversity.max, color,
                `types: ${(bd.source_diversity.types || []).join(', ')}`);
        }

        // Article timeline
        const articles = (story.articles || []).sort((a, b) => {
            const da = a.published_at || a.fetched_at || '';
            const db = b.published_at || b.fetched_at || '';
            return da < db ? -1 : da > db ? 1 : 0;
        });

        const timelineHTML = articles.map((a, i) => {
            const credColor = a.credibility_score >= 80 ? 'var(--verified)' :
                a.credibility_score >= 60 ? 'var(--likely)' : 'var(--developing)';
            const credBg = a.credibility_score >= 80 ? 'rgba(34,197,94,0.1)' :
                a.credibility_score >= 60 ? 'rgba(132,204,22,0.1)' : 'rgba(234,179,8,0.1)';
            const time = a.published_at ? timeAgo(a.published_at) : '';

            return `
                <div class="timeline-item">
                    <div class="timeline-header">
                        <div class="source-dot" style="background:${getSourceColor(a.source_id)};width:20px;height:20px;font-size:9px">
                            ${getSourceInitials(a.source_id)}
                        </div>
                        <div class="timeline-source">${escapeHtml(a.source_name || getSourceName(a.source_id))}</div>
                        <div class="timeline-cred" style="color:${credColor};background:${credBg}">${a.credibility_score}</div>
                        ${time ? `<div class="timeline-time">${time}</div>` : ''}
                    </div>
                    <div class="timeline-title">${escapeHtml(a.title)}</div>
                    <a href="${a.url}" target="_blank" rel="noopener" class="timeline-link">Read original article →</a>
                </div>`;
        }).join('');

        content.innerHTML = `
            <div class="detail-title">${escapeHtml(story.title)}</div>

            <div class="score-display">
                ${scoreRing(story.confidence_score, color)}
                <div class="score-info">
                    <div class="score-label" style="color:${color}">${story.confidence_label}</div>
                    <div class="score-desc">${story.confidence_description || ''}</div>
                </div>
            </div>

            <div class="breakdown-section">
                <div class="section-title">Why We Trust This</div>
                ${breakdownHTML}
            </div>

            <div class="breakdown-section">
                <div class="section-title">Source Timeline (${articles.length} articles)</div>
                <div class="timeline">${timelineHTML}</div>
            </div>
        `;
    } catch (e) {
        content.innerHTML = `<div class="empty-state">Error loading story detail</div>`;
    }
}

function buildBar(label, points, max, color, detail) {
    const pct = Math.round(points / max * 100);
    return `
        <div class="breakdown-bar">
            <div class="breakdown-label">${label}</div>
            <div class="breakdown-track">
                <div class="breakdown-fill" style="width:${pct}%;background:${color}"></div>
            </div>
            <div class="breakdown-value">${points}/${max}</div>
        </div>
        <div class="breakdown-detail">${detail}</div>`;
}

function closeDetail(e) {
    if (e && e.target.id !== 'detail-overlay') return;
    document.getElementById('detail-overlay').classList.remove('open');
    document.body.style.overflow = '';
}

// ─── FILTERS ───────────────────────────────────────────
document.querySelectorAll('.filter-btn[data-region]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-region]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRegion = btn.dataset.region;
        loadStories();
    });
});
document.querySelectorAll('.filter-btn[data-confidence]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-confidence]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMinConfidence = parseFloat(btn.dataset.confidence);
        loadStories();
    });
});

// ─── HELPERS ───────────────────────────────────────────
function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t || '';
    return d.innerHTML;
}
function timeAgo(ds) {
    if (!ds) return '';
    const diff = Math.floor((new Date() - new Date(ds)) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
}

// ─── KEYBOARD ──────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ─── INIT ──────────────────────────────────────────────
loadStats();
loadStories();
setInterval(() => { loadStats(); loadStories(); }, 5 * 60 * 1000);
</script>
